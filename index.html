<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Supuestos - Canarias</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { margin: 0; background: #09090f; color: #f0ece0; font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const CORPS = {
          canaria: { id: "canaria", name: "Policía Canaria", color: "#FFD700", accent: "#FF6B00", badge: "🛡️", emblem: "GOBIERNO DE CANARIAS" },
          local:   { id: "local",   name: "Policía Local",   color: "#4FC3F7", accent: "#0288D1", badge: "⚖️", emblem: "CABILDO INSULAR" },
        };

        const DEMO = {
          id: 0, titulo: "Supuesto Demo — Alteración del Orden Público",
          enunciado: "Son las 23:47 horas del sábado 15 de marzo. La Central de Comunicaciones recibe una llamada alertando de una pelea multitudinaria en la Plaza del Mercado. Al llegar a la escena, los agentes encuentran a un grupo de aproximadamente 20 personas involucradas en una reyerta. Hay tres personas lesionadas visibles. Uno de los implicados porta lo que parece ser una botella rota.",
          preguntas: [
            { id:1, texto:"¿Cuál debe ser la primera acción del agente al llegar a la escena?", opciones:["A) Identificar a todos los presentes","B) Evaluar la situación y solicitar refuerzos","C) Proceder a la detención del individuo con la botella","D) Acordonar el perímetro sin intervenir"], correcta:1, explicacion:"La evaluación situacional es prioritaria según el protocolo de actuación policial." },
            { id:2, texto:"Respecto al individuo con la botella rota, el agente debe:", opciones:["A) Ignorarlo hasta controlar al resto","B) Dispararle como medida preventiva","C) Neutralizar la amenaza de forma proporcional","D) Llamar a los servicios médicos antes de intervenir"], correcta:2, explicacion:"El principio de proporcionalidad obliga al agente a identificar y neutralizar la amenaza más grave primero." },
            { id:3, texto:"Las personas lesionadas deben ser atendidas:", opciones:["A) Solo por el agente con primeros auxilios","B) Solicitando asistencia sanitaria al 112","C) Solo tras detener a todos los implicados","D) Por los testigos civiles"], correcta:1, explicacion:"La obligación de socorro es un deber legal y ético. Se debe solicitar asistencia médica inmediata." },
          ],
        };

        const STORAGE_KEY = (corp) => `academia_supuestos_${corp}`;
        const loadSupuestos = (corp) => { try { const raw = localStorage.getItem(STORAGE_KEY(corp)); return raw ? JSON.parse(raw) : []; } catch { return []; } };
        const saveSupuestos = (corp, list) => { try { localStorage.setItem(STORAGE_KEY(corp), JSON.stringify(list)); } catch {} };

        const MARCO_NORMATIVO = `Marco normativo aplicable: Constitución Española, LOFCS 2/1986, LECrim, LSC 4/2015, Código Penal, y normativa canaria (Ley 6/1997).`;

        function LoadingDots() {
          return (
            <span style={{ display:"inline-flex", gap:4, alignItems:"center" }}>
              {[0,1,2].map(i => (
                <span key={i} style={{ width:5, height:5, borderRadius:"50%", background:"currentColor", display:"inline-block" }} />
              ))}
            </span>
          );
        }

        function CorpSelector({ onSelect }) {
          const [hov, setHov] = useState(null);
          return (
            <div style={{ minHeight:"100vh", background:"#09090f", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"2rem" }}>
              <div style={{ textAlign:"center", marginBottom:"3.5rem" }}>
                <h1 style={{ fontSize:"2.5rem", color:"#f5f0e8", marginBottom:"1rem" }}>Academia · Islas Canarias</h1>
                <p style={{ color:"#666" }}>Selecciona tu cuerpo policial para comenzar</p>
              </div>
              <div style={{ display:"flex", gap:"1.5rem", flexWrap:"wrap", justifyContent:"center" }}>
                {Object.values(CORPS).map(corp => (
                  <button key={corp.id} onClick={() => onSelect(corp.id)}
                    style={{ background: "rgba(255,255,255,0.025)", border:`1px solid ${corp.color}`, borderRadius:6, padding:"2.5rem 2rem", cursor:"pointer", color:"#fff", minWidth:240 }}>
                    <div style={{ fontSize:"2.5rem" }}>{corp.badge}</div>
                    <div style={{ fontSize:"1.25rem", fontWeight:"600" }}>{corp.name}</div>
                  </button>
                ))}
              </div>
            </div>
          );
        }

        function Library({ corp, onStartTest, onBack }) {
          const [supuestos, setSupuestos] = useState(() => { const saved = loadSupuestos(corp); return saved.length > 0 ? saved : [DEMO]; });
          const c = CORPS[corp];
          return (
            <div style={{ padding:"2rem" }}>
              <button onClick={onBack} style={{ color:"#888", background:"none", border:"none", cursor:"pointer" }}>← Volver</button>
              <h2>Biblioteca - {c.name}</h2>
              <div style={{ display:"flex", flexDirection:"column", gap:"1rem" }}>
                {supuestos.map((s, i) => (
                  <div key={i} style={{ background:"#161618", padding:"1.5rem", borderRadius:8, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div><strong>{s.titulo}</strong><br/><small>{s.preguntas.length} preguntas</small></div>
                    <button onClick={() => onStartTest(s)} style={{ background:c.color, border:"none", padding:"0.5rem 1rem", borderRadius:4, cursor:"pointer", fontWeight:"bold" }}>Iniciar Test</button>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        function TestView({ corp, supuesto, onBack }) {
          const [answers, setAnswers] = useState({});
          const [submitted, setSubmitted] = useState(false);
          const c = CORPS[corp];
          const score = supuesto.preguntas.filter((p,i) => answers[i] === p.correcta).length;

          return (
            <div style={{ padding:"2rem" }}>
              <div style={{ display:"flex", justifyContent:"space-between", position:"sticky", top:0, background:"#09090f", padding:"1rem 0" }}>
                <button onClick={onBack} style={{ color:"#888", border:"none", background:"none" }}>← Salir</button>
                {submitted && <h3>Resultado: {score}/{supuesto.preguntas.length}</h3>}
              </div>
              <h2>{supuesto.titulo}</h2>
              <p style={{ background:"#1a1a2e", padding:"1rem", borderRadius:8 }}>{supuesto.enunciado}</p>
              {supuesto.preguntas.map((q, qIdx) => (
                <div key={qIdx} style={{ marginBottom:"2rem", borderBottom:"1px solid #222", paddingBottom:"1rem" }}>
                  <p><strong>{qIdx+1}. {q.texto}</strong></p>
                  {q.opciones.map((opt, optIdx) => (
                    <button key={optIdx} onClick={() => !submitted && setAnswers({...answers, [qIdx]: optIdx})}
                      style={{ display:"block", width:"100%", textAlign:"left", padding:"0.8rem", margin:"0.3rem 0", borderRadius:4, cursor:submitted?"default":"pointer",
                        background: answers[qIdx] === optIdx ? (submitted ? (optIdx === q.correcta ? "#16a34a" : "#dc2626") : c.color) : "#161618",
                        border: "1px solid #333", color: answers[qIdx] === optIdx ? "#000" : "#ccc" }}>
                      {opt}
                    </button>
                  ))}
                  {submitted && <p style={{ fontSize:"0.8rem", color:"#888" }}>{q.explicacion}</p>}
                </div>
              ))}
              {!submitted && <button onClick={() => setSubmitted(true)} style={{ width:"100%", padding:"1rem", background:c.color, border:"none", borderRadius:6, fontWeight:"bold" }}>Finalizar</button>}
            </div>
          );
        }

        function App() {
          const [screen, setScreen] = useState("home");
          const [corp, setCorp] = useState(null);
          const [supuesto, setSupuesto] = useState(null);
          if (screen==="home") return <CorpSelector onSelect={id => { setCorp(id); setScreen("library"); }} />;
          if (screen==="library") return <Library corp={corp} onBack={() => setScreen("home")} onStartTest={s => { setSupuesto(s); setScreen("test"); }} />;
          if (screen==="test") return <TestView corp={corp} supuesto={supuesto} onBack={() => setScreen("library")} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
